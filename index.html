<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Pages</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 0 20px;
      background: #fff;
      color: #111;
    }

    h1 { margin-bottom: 8px; }

    p { color: #666; font-size: 0.9rem; margin-bottom: 24px; }

    a {
      display: block;
      padding: 14px 16px;
      margin-bottom: 10px;
      background: #f0f5ff;
      border: 1px solid #c7d9ff;
      border-radius: 8px;
      text-decoration: none;
      color: #2563eb;
      font-size: 1rem;
    }

    a:hover { background: #dbeafe; }
  </style>
</head>
<body>
  <h1>My Pages</h1>
  <p id="status">Loading...</p>
  <div id="links"></div>

  <script>
    (async () => {
      const status = document.getElementById('status');
      const linksDiv = document.getElementById('links');

      try {
        const host = window.location.hostname.split('.');
        if (host[1] !== 'github' || host[2] !== 'io') {
          status.textContent = 'Deploy to GitHub Pages to see your files.';
          return;
        }

        const username = host[0];
        const pathParts = window.location.pathname.split('/').filter(Boolean);
        const repo = pathParts.length > 0 ? pathParts[0] : `${username}.github.io`;
        const dir = pathParts.length > 1 ? pathParts.slice(1).join('/') : '';

        const res = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${dir}`);
        if (!res.ok) throw new Error(`API error ${res.status}`);

        const files = (await res.json()).filter(f =>
          f.type === 'file' && f.name.endsWith('.html') && f.name !== 'index.html'
        );

        if (!files.length) { status.textContent = 'No HTML files found.'; return; }

        status.textContent = `${files.length} page(s)`;
        files.forEach(f => {
          const a = document.createElement('a');
          a.href = f.name;
          a.textContent = f.name.replace('.html', '').replace(/[-_]/g, ' ');
          linksDiv.appendChild(a);
        });

      } catch (e) {
        status.textContent = `Error: ${e.message}`;
      }
    })();
  </script>
</body>
</html>
